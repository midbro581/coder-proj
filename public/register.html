<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Coder</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">Coder<span>.</span></a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="compiler.html">Compiler</a>
      <a href="team.html">Team</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-nav-login">Log In</a>
    </div>
    <div id="nav-user-info" style="display:none;">
      <a href="profile.html" class="nav-profile-link" id="nav-profile-link"><i class="fas fa-user-circle"></i> <span id="nav-username"></span></a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>

  <div class="page-wrapper">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>Coder.</h1>
          <p>Create your free account and start coding today</p>
        </div>

        <div class="alert alert-error" id="alert-error"></div>
        <div class="alert alert-success" id="alert-success"></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" autocomplete="username" />
            <div class="form-error" id="username-error"></div>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
            <div class="form-error" id="email-error"></div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="toggle-pw"><i class="fas fa-eye"></i></button>
            </div>
            <div class="form-error" id="password-error"></div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-wrapper">
              <input type="password" id="confirm-password" name="confirm-password" class="form-control" placeholder="Repeat your password" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="toggle-pw2"><i class="fas fa-eye"></i></button>
            </div>
            <div class="form-error" id="confirm-error"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            <i class="fas fa-user-plus"></i> Create Account
          </button>
        </form>

        <div class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
