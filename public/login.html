<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Coder</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">Coder<span>.</span></a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="compiler.html">Compiler</a>
      <a href="team.html">Team</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <a href="register.html" class="btn-nav-signup">Sign Up Free</a>
    </div>
    <div id="nav-user-info" style="display:none;">
      <a href="profile.html" class="nav-profile-link" id="nav-profile-link"><i class="fas fa-user-circle"></i> <span id="nav-username"></span></a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>

  <div class="page-wrapper">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>Coder.</h1>
          <p>Welcome back — log in to continue learning</p>
        </div>

        <div class="alert alert-error" id="alert-error"></div>
        <div class="alert alert-success" id="alert-success"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="identifier">Email or Username</label>
            <input type="text" id="identifier" name="identifier" class="form-control" placeholder="you@example.com or your username" autocomplete="username" autocapitalize="off" autocorrect="off" />
            <div class="form-error" id="identifier-error"></div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
              <button type="button" class="password-toggle" id="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
            </div>
            <div class="form-error" id="password-error"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <i class="fas fa-sign-in-alt"></i> Log In
          </button>
        </form>

        <div class="auth-switch">
          Don't have an account? <a href="register.html">Sign up free</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
